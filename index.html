<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Portfolio</title>
    <link rel="stylesheet" href="style.innit.css">
    <!-- linking font -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        montserrat: ['Montserrat', 'sans-serif'],
                                }
                        }
                    }
                            }   
    </script>
    
</head>
<body class="text-white bg-[#1A1A1A] font-montserrat">
    <section id="sec-1" class="navbar flex container mx-auto items-center justify-between py-4">
        <img src="assets/logo.png" alt="logo" class="h-16 mt-2 ml-3">
        <div>
            <ul class="flex gap-8 font-medium">
                <li class="cursor-pointer px-4 py-2 border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7]  hover:text-black transition">Home</li>
                <li class="cursor-pointer px-4 py-2 border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7]  hover:text-black transition">About</li>
                <li class="cursor-pointer px-4 py-2 border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7]  hover:text-black transition">Project</li>
                <li class="cursor-pointer px-4 py-2 border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7]  hover:text-black transition">Services</li>
                <li class="cursor-pointer px-4 py-2 border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7]  hover:text-black transition">Resume</li>
            </ul>
        </div>
        <div class="flex justify-around items-center gap-10">
            <button class="px-4 py-2 border border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7] hover:text-black transition">Contact Me</button>
            <img src="assets/dark-mode.png" alt="" class="h-8 cursor-pointer mr-3">
        </div>

    </section>

    <section id="sec-2">
        <div class="container mx-auto bg-[url('assets/rectangle3.png')] bg-cover bg-center h-[500px] w-[60%] flex flex-col justify-center items-center">
            <img src="assets/photo.jpeg" alt="" class=" h-56 w-56 border-4 border-white rounded-full object-cover shadow-lg">
            <h1 class="text-4xl font-bold mt-6">Shree Tirtha</h1>
            <p class="text-2xl font-semibold bg-[linear-gradient(to_right,#4FC3F7,#FFFFFF)] bg-clip-text text-transparent mt-2">Aspiring Web Developer</p>
            <p class="text-lg text-gray-200 mt-2">As a passionate Full-Stack Developer, with expertise in Front-end Web tech, AI, and ML, I thrive on the challenges of exploring new technology and uncovering meaningful patterns that drive innovation.</p>
            <button class="px-4 py-2 border border-[#4FC3F7] rounded-xl hover:bg-[#4FC3F7] hover:text-black transition mt-8">Contact Me</button>
        </div>
        
    </section>
    <script src="script.js"></script>
</body>
</html>
